<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body  body style="background-color: rgb(43, 36, 36) ; color : white;display:flex; justify-content:center; align-items:center; ">
    <div class="main" style="position:center">
        <h1>TIME RIGHT NOW</h1>
        <div class="clock" style=" background-Color:#14e014 ; color:red  ; padding:100px ; margin:10px">

        </div>
    </div>
    <script>
        clock = document.querySelector(".clock");
        
        setInterval(function(){
            currdate = new Date();
            clock.textContent = currdate.toLocaleTimeString(); 
        } ,1000);
    </script>
</body>
</html>
