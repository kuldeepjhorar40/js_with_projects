//  ------- backgroundcolor changer ----------
body.style.backgroundColor = "#121212";
let interval;
const randNum = function(el){
    let colorChoice = "0123456789ABCDEF";
    let color1 = "#";
    for(let i = 0 ; i < 6 ; i++){
        color1+=colorChoice[Math.floor(Math.random()*15)];
    }

    el.style.backgroundColor = color1;
    
}
start.addEventListener("click",function(){
    if(!interval){
        interval=setInterval(randNum,1000, body);
    }
})
stop.addEventListener("click",function(){
    if(interval){
        clearInterval(interval);
        interval = null;
    }
})
